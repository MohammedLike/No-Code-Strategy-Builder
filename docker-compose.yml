services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: ai-builder-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5430}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_builder_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ai_strategy_builder}
    volumes:
      - ai_builder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: ai-builder-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ai_builder_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ai_builder_pgdata:
  ai_builder_qdrant_data:
